<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Visore - Fake SLAM</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        /* Video invisibile per l'IA */
        #hidden-video { position: fixed; opacity: 0; width: 1px; height: 1px; }
        #start_btn {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 18px; background: #00FF00; 
            border: none; border-radius: 10px; z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="start_btn" onclick="startApp()">AVVIA OLOGRAFO</button>
    <video id="hidden-video" playsinline autoplay></video>

    <a-scene background="color: black" xr-mode-ui="enabled: false">
        
        <a-entity id="ologram-screen" 
                  geometry="primitive: plane; width: 0.6; height: 0.4" 
                  material="color: #00FF00; emissive: #00FF00; side: double" 
                  position="0 1.5 -1.5">
             <a-text value="AFFERRAMI" align="center" width="2" position="0 0 0.02" color="black"></a-text>
        </a-entity>

        <a-camera id="player-camera" position="0 1.6 0" look-controls="enabled: true">
            <a-sphere id="hand-dot" radius="0.02" color="red" visible="false" material="shader: flat"></a-sphere>
        </a-camera>

    </a-scene>

    <script src="script.js"></script>
</body>
</html>
