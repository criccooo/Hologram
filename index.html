<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR YouTube Hologram</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>
<body>
  
  <button id="webcamButton">Caricamento AI...</button>
  <div id="pinchAlert">PINCH ATTIVO! 🤏</div>
  
  <video id="webcam" autoplay playsinline></video>
  <canvas id="output_canvas"></canvas>

  <iframe id="youtubeIframe" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>

  <a-scene embedded vr-mode-ui="enabled: false">
    <a-camera position="0 1.6 0"></a-camera>
    <a-entity id="hologram" position="0 1.5 -3"></a-entity>
  </a-scene>

  <script type="module" src="script.js"></script>
</body>
</html>
