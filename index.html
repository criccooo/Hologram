<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR SLAM + Mani (WebXR Camera Access)</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        /* Il canvas dove "stampiamo" i frame segreti estratti da WebXR */
        #extraction-canvas { display: none; }
    </style>
</head>
<body>

    <canvas id="extraction-canvas" width="640" height="480"></canvas>

    <a-scene webxr="requiredFeatures: hit-test, camera-access" ar-hit-test="target: #reticle" xr-camera-bridge>
        
        <a-entity id="reticle" 
                  geometry="primitive: ring; radiusInner: 0.1; radiusOuter: 0.15" 
                  material="color: #00FF00; shader: flat" 
                  rotation="-90 0 0">
        </a-entity>

        <a-entity id="ologram-screen" 
                  geometry="primitive: plane; width: 0.6; height: 0.4" 
                  material="color: #00FF00; emissive: #00FF00; emissiveIntensity: 0.5; side: double" 
                  visible="false">
             <a-text value="AFFERRATO!" id="status-text" align="center" width="2" position="0 0 0.02" visible="false"></a-text>
        </a-entity>

        <a-camera position="0 1.6 0">
            <a-sphere id="hand-dot" radius="0.02" color="red" position="0 0 -0.5" visible="false" material="shader: flat"></a-sphere>
        </a-camera>
        
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
