<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Visore AR - Vista Studente</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
        #start_btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; font-size: 20px; z-index: 10; cursor: pointer;}
        #debug-text { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; z-index: 10; font-family: sans-serif; font-weight: bold; }
        
        /* Scena 3D trasparente, video sotto */
        a-scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #input_video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
    </style>
</head>
<body>
    
    <div id="debug-text">In attesa...</div>
    <button id="start_btn">AVVIA VISORE AR</button>
    
    <video id="input_video" autoplay playsinline></video>

    <a-scene>
        
        <a-assets>
            <a-asset-item id="modelloEsame" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/FlightHelmet/glTF/FlightHelmet.gltf"></a-asset-item>
        </a-assets>

        <a-camera id="player-camera" position="0 1.6 0" look-controls></a-camera>
        
        <a-entity id="hand-dot" geometry="primitive: sphere; radius: 0.02" material="color: red" visible="false"></a-entity>
        
        <a-entity id="ologram-screen" 
                  gltf-model="#modelloEsame" 
                  scale="2 2 2" 
                  position="0 1.5 -1.5">
        </a-entity>

    </a-scene>

    <script src="script.js"></script>
</body>
</html>
