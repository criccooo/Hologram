<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Visore AR - Mani</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #input_video { display: none; /* La telecamera vera è nascosta, la vedi tramite il motore 3D */ }
        #start_btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 24px; font-weight: bold; z-index: 999;
            background-color: #00FF00; color: black; border: none; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <button id="start_btn">AVVIA VISORE</button>
    <video id="input_video"></video>

    <a-scene>
        <a-camera id="player-camera" position="0 1.6 0"></a-camera>
        
        <a-entity id="hand-dot" geometry="primitive: sphere; radius: 0.03" material="color: red" visible="false"></a-entity>
        
        <a-entity id="ologram-screen" geometry="primitive: box; width: 0.2; height: 0.2; depth: 0.2" material="color: yellow; wireframe: true" position="0 1.5 -1"></a-entity>
        
        <a-text id="debug-text" value="IN ATTESA DI AVVIO..." position="0 2 -1.5" color="white" align="center" width="3"></a-text>
    </a-scene>

    <script src="script.js"></script>

</body>
</html>
