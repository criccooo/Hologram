<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Viewer - Vista Professore</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #222; }
        #info-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 15px 30px; border-radius: 10px; font-size: 18px; z-index: 10; text-align: center; border: 1px solid #444;}
    </style>
</head>
<body>

    <div id="info-panel">Sintonizzazione alla rete in corso...</div>

    <a-scene webxr="requiredFeatures: hit-test;" ar-hit-test="target: #ancora-pavimento">
        
        <a-assets>
            <a-asset-item id="modelloEsame" src="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/FlightHelmet/glTF/FlightHelmet.gltf"></a-asset-item>
        </a-assets>

        <a-entity id="reticle" geometry="primitive: ring; radiusInner: 0.1; radiusOuter: 0.15" 
                  material="color: #00FF00; shader: flat" rotation="-90 0 0" visible="false"></a-entity>

        <a-entity id="ancora-pavimento" visible="false">
            <a-entity id="ologram-screen" 
                      gltf-model="#modelloEsame" 
                      scale="2 2 2" 
                      position="0 1.5 -1.5">
            </a-entity>
        </a-entity>

        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const ancora = document.getElementById('ancora-pavimento');
        const ologram = document.getElementById('ologram-screen');
        const scene = document.querySelector('a-scene');
        const infoPanel = document.getElementById('info-panel');
        let oggettoPiazzato = false;

        // Gestione posizionamento base (Clic per ancorare)
        function piazzaOggetto(posizione) {
            if (oggettoPiazzato) return;
            ancora.setAttribute('position', posizione);
            ancora.setAttribute('visible', 'true');
            oggettoPiazzato = true;
            infoPanel.innerText = 'Oggetto posizionato. In attesa dei movimenti dallo studente...';
        }

        scene.addEventListener('ar-hit-test-select', (e) => {
            const reticlePos = document.getElementById('reticle').getAttribute('position');
            piazzaOggetto(reticlePos);
        });

        window.addEventListener('click', () => {
            // Backup se usato da Desktop normale invece che visore AR
            if(!oggettoPiazzato) piazzaOggetto({x: 0, y: 1, z: -2});
        });

        // --- RETE MQTT: Ricezione dei movimenti ---
        const brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
        const topicSegreto = 'esame_ar_visore_2026_super_segreto';
        const mqttClient = mqtt.connect(brokerUrl);

        mqttClient.on('connect', () => {
            mqttClient.subscribe(topicSegreto, (err) => {
                if (!err) infoPanel.innerText = 'Rete Connessa. Clicca lo schermo per far apparire il modello base.';
            });
        });

        mqttClient.on('message', (topic, message) => {
            if (oggettoPiazzato) {
                try {
                    const dati = JSON.parse(message.toString());
                    // Animazione fluida verso la nuova coordinata ricevuta
                    ologram.setAttribute('animation', `property: position; to: ${dati.x} ${dati.y} ${dati.z}; dur: 75; easing: linear`);
                } catch (e) {
                    console.error("Dati non validi", e);
                }
            }
        });
    </script>
</body>
</html>
